<body>

            <div class="sync-status-bar">

        <nav class="board-nav">

        <div class="thread-form-container">
            <form id="newThreadForm" enctype="multipart/form-data">
                <div class="form-row">
                    <input type="text" id="threadSubject" placeholder="Тема (необязательно)" maxlength="100">
                    <input type="text" id="threadName" placeholder="Имя (опционально)" maxlength="50">
                </div>
                <div class="form-row">
                    <textarea id="threadComment" rows="3" placeholder="Комментарий..." required></textarea>
                </div>
                <div class="form-row captcha-row">
                    <div class="captcha-container">
                        <span id="captchaQuestion" class="captcha-question"></span>

                <div class="form-row file-row">
                    <label for="threadFile" class="file-label">📁 Прикрепить файл</label>
                    <input type="file" id="threadFile" accept="image/png,image/jpeg,image/gif,image/webp">
                    <span class="file-name" id="fileChosen">Файл не выбран</span>

        <footer class="board-footer">

            </div>
        </footer>
    </div>

    <canvas id="shaderCanvas"></canvas>

    <script>
        window.CURRENT_BOARD = 'c';
    </script>
    
    <!-- GLSL Shader implementation - exact conversion of your HLSL -->
    <script>
        const canvas = document.getElementById('shaderCanvas');
        const gl = canvas.getContext('webgl');
        
        if (gl) {
            // Vertex shader
            const vsSource = `
                attribute vec2 a_position;
                varying vec2 v_texCoord;
                void main() {
                    gl_Position = vec4(a_position, 0.0, 1.0);
                    v_texCoord = a_position * 0.5 + 0.5;
                }
            `;
            
            // Fragment shader - EXACT conversion of your HLSL
            const fsSource = `
                precision highp float;
                uniform sampler2D u_texture;
                uniform float u_time;
                uniform vec2 u_textureSize;
                uniform float u_chromaticAberration;
                
                varying vec2 v_texCoord;
                
                // Simple noise function
                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453123);
                }
                
                void main() {
                    vec2 pixelationFactor = 1.0 / u_textureSize;
                    vec2 coords = floor(v_texCoord / pixelationFactor) * pixelationFactor;
                    
                    // Calculate values for glitch noise
                    float glitchPixelationFactor = 72.0;
                    float timeStepFactor = 11.0;
                    float glitchCoords = floor(coords.y * glitchPixelationFactor) / glitchPixelationFactor + floor(u_time * timeStepFactor) / timeStepFactor;
                    float glitchNoise = noise(vec2(glitchCoords, 0.0));
                    
                    glitchCoords = floor(coords.y * glitchPixelationFactor * 0.5) / glitchPixelationFactor + floor(u_time * timeStepFactor * 1.5) / timeStepFactor;
                    glitchNoise = (glitchNoise + noise(vec2(glitchCoords, 0.0))) * 0.67;
                    
                    glitchCoords = floor(coords.y * glitchPixelationFactor * 0.4) / glitchPixelationFactor + floor(u_time * timeStepFactor * 1.3) / timeStepFactor;
                    glitchNoise = (glitchNoise + noise(vec2(glitchCoords, 0.0))) * 0.62;
                    
                    // Perform glitch offset and re-pixelate
                    coords.x += smoothstep(0.8, 1.0, glitchNoise) * 0.05;
                    coords = round(coords / pixelationFactor) * pixelationFactor;
                    
                    float r = texture2D(u_texture, coords + vec2(-0.707, 0.0) / u_textureSize * u_chromaticAberration).r;
                    float g = texture2D(u_texture, coords + vec2(0.707, 0.0) / u_textureSize * u_chromaticAberration).g;
                    float b = texture2D(u_texture, coords + vec2(0.0, 0.707) / u_textureSize * u_chromaticAberration).b;
                    float a = texture2D(u_texture, coords).a;
                    
                    gl_FragColor = vec4(r, g, b, a);
                }
            `;
            
            function compileShader(source, type) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error(gl.getShaderInfoLog(shader));
                    return null;
                }
                return shader;
            }
            
            const vs = compileShader(vsSource, gl.VERTEX_SHADER);
            const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            gl.useProgram(program);
            
            // Setup geometry
            const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
            
            const posLoc = gl.getAttribLocation(program, 'a_position');
            gl.enableVertexAttribArray(posLoc);
            gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
            
            // Get uniform locations
            const textureLoc = gl.getUniformLocation(program, 'u_texture');
            const timeLoc = gl.getUniformLocation(program, 'u_time');
            const textureSizeLoc = gl.getUniformLocation(program, 'u_textureSize');
            const aberrationLoc = gl.getUniformLocation(program, 'u_chromaticAberration');
            
            // Create texture for page capture
            const texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            
            let startTime = performance.now() / 1000;
            
            function captureAndRender() {
                // Capture page as texture
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const ctx = tempCanvas.getContext('2d');
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                document.body.style.backgroundColor = '#1a1a1a';
                
                // Draw the container content
                const container = document.querySelector('.container');
                if (container) {
                    html2canvas(container, {
                        scale: 0.5,
                        backgroundColor: '#eef2ff'
                    }).then(canvasImg => {
                        gl.bindTexture(gl.TEXTURE_2D, texture);
                        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvasImg);
                        
                        const time = (performance.now() / 1000 - startTime) * 0.5;
                        
                        gl.viewport(0, 0, canvas.width, canvas.height);
                        gl.uniform1i(textureLoc, 0);
                        gl.uniform1f(timeLoc, time);
                        gl.uniform2f(textureSizeLoc, canvas.width, canvas.height);
                        gl.uniform1f(aberrationLoc, 15.0);
                        
                        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                        requestAnimationFrame(captureAndRender);
                    }).catch(() => {
                        requestAnimationFrame(captureAndRender);
                    });
                } else {
                    requestAnimationFrame(captureAndRender);
                }
            }
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            // Add html2canvas library
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
            script.onload = () => {
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                captureAndRender();
            };
            document.head.appendChild(script);
        } else {
            console.error('WebGL not supported');
        }
    </script>
    
    <script src="../scripts/script.js"></script>
</body>
</html>
