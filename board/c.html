<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>/c/ - 9chan</title>
    <link rel="icon" href="../icon.png" type="image/png">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/base-phone.css">
    <style>
        .banner-deutsch {
            background: #FFF200;
            padding: 0;
            margin-top: 12px;
            text-align: center;
        }
        .banner-deutsch img {
            display: block;
            margin: 0 auto;
        }
        
        /* Анимация для редкого глюка */
        @keyframes rareGlitch {
            0%, 97%, 100% {
                transform: translate(0, 0);
                filter: none;
                text-shadow: none;
            }
            97.5% {
                transform: translate(-3px, 1px);
                filter: hue-rotate(90deg) contrast(200%) brightness(150%);
                text-shadow: 3px 0 red, -3px 0 cyan;
            }
            98% {
                transform: translate(3px, -2px);
                filter: hue-rotate(-90deg) contrast(150%) brightness(200%);
                text-shadow: -3px 0 red, 3px 0 cyan;
            }
            98.5% {
                transform: translate(-2px, 2px);
                filter: hue-rotate(180deg) contrast(300%);
                text-shadow: 2px 0 magenta, -2px 0 lime;
            }
            99% {
                transform: translate(2px, -1px);
                filter: hue-rotate(-180deg) contrast(200%);
                text-shadow: -2px 0 magenta, 2px 0 lime;
            }
            99.5% {
                transform: translate(-1px, 0);
                filter: brightness(250%) saturate(300%);
                text-shadow: 1px 0 blue, -1px 0 yellow;
            }
        }
        
        /* Полоски глюка */
        @keyframes glitchBars {
            0%, 96%, 100% {
                opacity: 0;
            }
            96.5%, 99.5% {
                opacity: 1;
            }
            97% {
                opacity: 0.3;
            }
            98% {
                opacity: 0.5;
            }
        }
        
        /* Эффект горизонтальных полос */
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99998;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.8) 0px,
                rgba(0, 0, 0, 0.8) 2px,
                transparent 2px,
                transparent 8px
            );
            opacity: 0;
            animation: glitchBars 12s infinite;
            mix-blend-mode: overlay;
        }
        
        /* Класс для активного глюка */
        body.glitching {
            animation: rareGlitch 0.4s ease-out;
        }
        
        /* Дополнительный эффект для картинок при глюке */
        body.glitching img {
            filter: hue-rotate(180deg) contrast(200%);
            transition: filter 0.05s;
        }
        
        /* Эффект мерцания экрана */
        @keyframes screenFlicker {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 0.2; background: rgba(255,255,255,0.9); }
            97% { opacity: 0; }
            98% { opacity: 0.1; background: rgba(0,255,255,0.5); }
            99% { opacity: 0; }
        }
        
        .flicker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999;
            background: rgba(255,255,255,0);
            animation: screenFlicker 15s infinite;
        }
    </style>
</head>
<body>
    <!-- Оверлеи для эффектов -->
    <div class="glitch-overlay"></div>
    <div class="flicker-overlay"></div>
    
    <div class="container">
        <header class="board-header">
            <div class="logo-area">
                <img src="../icon.png" alt="9chan" class="hitme-icon" onerror="this.src='../hitme.png'">
                <h1>/c/ - CREEPYPASTA BOARD</h1>
                <div class="mascot-placeholder">
                    <img src="../icon.png" alt="mascot" style="width:48px;height:48px;object-fit:contain;border-radius:50%;" onerror="this.src='../hitme.png'">
                </div>
            </div>
            <div class="header-links">
                <a href="../index.html">Главная</a>
                <a href="cat.html">Каталог</a>
                <a href="rules.html">Правила</a>
                <a href="help.html">Помощь</a>
            </div>
            <div class="sync-status-bar">
                <span id="syncStatusText" class="sync-status">🔄 Загрузка...</span>
            </div>
            <div class="auth-container" id="authContainer"></div>
            <div class="banner-deutsch">
                <img src="../c.png" alt="c board banner" onerror="this.src='../hitme.png'">
            </div>
        </header>

        <nav class="board-nav">
            <span class="board-label">Доски:</span>
            <ul class="boards-list">
                <li><a href="b.html">/b/</a></li>
                <li><a href="g.html">/g/</a></li>
                <li><a href="a.html">/a/</a></li>
                <li><a href="pol.html">/pol/</a></li>
                <li><a href="d.html">/d/</a></li>
                <li><a href="k.html">/k/</a></li>
                <li><a href="c.html">/c/</a></li>
            </ul>
        </nav>

        <div class="board-stats">
            <span>🔥 Постов: <span id="threadCount">0</span></span>
        </div>

        <div class="threads-container" id="threadsContainer">
            <div class="loading-message">Загрузка...</div>
        </div>

        <footer class="board-footer">
            <div class="footer-content">
                <span>© 9chan — свобода слова, чёрный юмор, немецкое качество</span>
                <img src="../icon.png" alt="footer-icon" class="footer-icon" onerror="this.src='../hitme.png'">
            </div>
        </footer>
    </div>

    <script>
        window.CURRENT_BOARD = 'c';
    </script>
    
    <script>
        // Редкие глюки (случайные интервалы)
        let glitchTimeout = null;
        
        function triggerGlitch() {
            // Добавляем класс глюка
            document.body.classList.add('glitching');
            
            // Воспроизводим звук глюка (опционально)
            // const audio = new Audio('https://www.soundjay.com/misc/sounds/electric-glitch-01.mp3');
            // audio.volume = 0.3;
            // audio.play().catch(e => console.log('Audio not supported'));
            
            // Убираем класс через 0.4 секунды
            setTimeout(() => {
                document.body.classList.remove('glitching');
            }, 400);
            
            // Случайный интервал между глюками (от 8 до 25 секунд)
            const nextGlitchDelay = Math.random() * (25000 - 8000) + 8000;
            glitchTimeout = setTimeout(triggerGlitch, nextGlitchDelay);
        }
        
        // Запускаем первый глюк через 10 секунд
        setTimeout(triggerGlitch, 10000);
        
        // Дополнительно: рандомное мерцание текста в тредах
        setInterval(() => {
            if (Math.random() < 0.03) { // 3% шанс
                const threads = document.querySelectorAll('.thread-card');
                if (threads.length > 0) {
                    const randomThread = threads[Math.floor(Math.random() * threads.length)];
                    randomThread.style.transform = 'translateX(2px)';
                    setTimeout(() => {
                        randomThread.style.transform = '';
                    }, 100);
                }
            }
        }, 3000);
        
        // Эффект "битых пикселей"
        setInterval(() => {
            if (Math.random() < 0.05) { // 5% шанс
                const container = document.querySelector('.threads-container');
                if (container) {
                    const originalBg = container.style.background;
                    container.style.background = 'repeating-linear-gradient(90deg, #000, #000 2px, transparent 2px, transparent 8px)';
                    setTimeout(() => {
                        container.style.background = originalBg;
                    }, 150);
                }
            }
        }, 5000);
    </script>
    
    <script src="../scripts/script.js"></script>
</body>
</html>
