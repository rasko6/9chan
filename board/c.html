<!DOCTYPE html>

        #glitchCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999;
            opacity: 0.6;
            mix-blend-mode: screen;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="board-header">
            <div class="logo-area">
                <img src="../icon.png" alt="9chan" class="hitme-icon" onerror="this.src='../hitme.png'">

                <div class="mascot-placeholder">
                    <img src="../icon.png" alt="mascot" style="width:48px;height:48px;object-fit:contain;border-radius:50%;" onerror="this.src='../hitme.png'">
                </div>
            </div>
            <div class="header-links">
                <a href="../index.html">Главная</a>

                <a href="help.html">Помощь</a>
            </div>
            <div class="sync-status-bar">
                <span id="syncStatusText" class="sync-status">🔄 Загрузка...</span>
            </div>
            <div class="auth-container" id="authContainer"></div>
            <div class="banner-deutsch">
                <img src="../c.png" alt="c board banner" onerror="this.src='../hitme.png'">

        </header>

        <nav class="board-nav">
            <span class="board-label">Доски:</span>
            <ul class="boards-list">
                <li><a href="b.html">/b/</a></li>

                <li><a href="d.html">/d/</a></li>
                <li><a href="k.html">/k/</a></li>

            </ul>
        </nav>

        <div class="board-stats">
            <span>🔥 Постов: <span id="threadCount">0</span></span>
        </div>

        <div class="threads-container" id="threadsContainer">
            <div class="loading-message">Загрузка...</div>
        </div>

        <footer class="board-footer">
            <div class="footer-content">
                <span>© 9chan — свобода слова, чёрный юмор, немецкое качество</span>
                <img src="../icon.png" alt="footer-icon" class="footer-icon" onerror="this.src='../hitme.png'">
            </div>
        </footer>
    </div>

    <canvas id="glitchCanvas"></canvas>

    <script>
        window.CURRENT_BOARD = 'c';
    </script>
    
    <script>
        const canvas = document.getElementById('glitchCanvas');
        const gl = canvas.getContext('webgl');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        // Вершинный шейдер
        const vsSource = `
            attribute vec2 a_position;
            varying vec2 v_texCoord;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
                v_texCoord = a_position * 0.5 + 0.5;
            }
        `;
        
        // Фрагментный шейдер (твой HLSL конвертированный)
        const fsSource = `
            precision highp float;
            uniform sampler2D u_image;
            uniform float u_time;
            uniform vec2 u_resolution;
            varying vec2 v_texCoord;
            
            // Функция шума
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
            }
            
            float noise(vec2 st) {
                vec2 i = floor(st);
                vec2 f = fract(st);
                float a = random(i);
                float b = random(i + vec2(1.0, 0.0));
                float c = random(i + vec2(0.0, 1.0));
                float d = random(i + vec2(1.0, 1.0));
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
            }
            
            void main() {
                vec2 pixelationFactor = 1.0 / 500.0;
                vec2 coords = floor(v_texCoord / pixelationFactor) * pixelationFactor;
                
                float glitchPixelationFactor = 72.0;
                float timeStepFactor = 11.0;
                float glitchCoords = floor(coords.y * glitchPixelationFactor) / glitchPixelationFactor + floor(u_time * timeStepFactor) / timeStepFactor;
                float glitchNoise = noise(vec2(glitchCoords, 0.5));
                
                glitchCoords = floor(coords.y * glitchPixelationFactor * 0.5) / glitchPixelationFactor + floor(u_time * timeStepFactor * 1.5) / timeStepFactor;
                glitchNoise = (glitchNoise + noise(vec2(glitchCoords, 0.3))) * 0.67;
                
                glitchCoords = floor(coords.y * glitchPixelationFactor * 0.4) / glitchPixelationFactor + floor(u_time * timeStepFactor * 1.3) / timeStepFactor;
                glitchNoise = (glitchNoise + noise(vec2(glitchCoords, 0.7))) * 0.62;
                
                coords.x += smoothstep(0.8, 1.0, glitchNoise) * 0.05;
                coords = floor(coords / pixelationFactor) * pixelationFactor;
                
                float chromatic = 15.0;
                float r = texture2D(u_image, coords + vec2(-0.707, 0.0) / u_resolution * chromatic).r;
                float g = texture2D(u_image, coords + vec2(0.707, 0.0) / u_resolution * chromatic).g;
                float b = texture2D(u_image, coords + vec2(0.0, 0.707) / u_resolution * chromatic).b;
                float a = texture2D(u_image, coords).a;
                
                gl_FragColor = vec4(r, g, b, a) * 1.2;
            }
        `;
        
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                return null;
            }
            return shader;
        }
        
        const vs = compileShader(vsSource, gl.VERTEX_SHADER);
        const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        gl.useProgram(program);
        
        const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const posLoc = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
        
        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        
        let startTime = performance.now() / 1000;
        
        function drawImage() {
            // Рисуем всю страницу на канвас для захвата
            const captureCanvas = document.createElement('canvas');
            captureCanvas.width = canvas.width;
            captureCanvas.height = canvas.height;
            const ctx = captureCanvas.getContext('2d');
            ctx.fillStyle = '#eef2ff';
            ctx.fillRect(0, 0, captureCanvas.width, captureCanvas.height);
            
            // Пытаемся захватить контент
            const elements = document.querySelectorAll('.container');
            if (elements.length > 0) {
                html2canvas(elements[0], {
                    scale: 0.8,
                    backgroundColor: '#eef2ff',
                    logging: false
                }).then(captured => {
                    gl.bindTexture(gl.TEXTURE_2D, texture);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, captured);
                    
                    const time = (performance.now() / 1000 - startTime) * 0.5;
                    gl.uniform1f(gl.getUniformLocation(program, 'u_time'), time);
                    gl.uniform2f(gl.getUniformLocation(program, 'u_resolution'), canvas.width, canvas.height);
                    gl.uniform1i(gl.getUniformLocation(program, 'u_image'), 0);
                    
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    requestAnimationFrame(drawImage);
                }).catch(() => {
                    requestAnimationFrame(drawImage);
                });
            } else {
                requestAnimationFrame(drawImage);
            }
        }
        
        // Загружаем html2canvas
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        script.onload = () => {
            drawImage();
        };
        document.head.appendChild(script);
    </script>
    
    <script src="../scripts/script.js"></script>
</body>
</html>
