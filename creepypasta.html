<!DOCTYPE html>
<html>
<style>
  body {
    background-color: #050000;
    color: #8b0000;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden; /* Чтобы нельзя было убежать */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-shadow: 2px 2px 5px #000, 0 0 20px #f00;
  }

  h1 {
    font-size: 3rem;
    text-transform: uppercase;
    animation: glitch 0.2s infinite;
  }

  p {
    font-size: 1.5rem;
    animation: shake 0.5s infinite;
  }

  /* Эффект помех и подергивания */
  @keyframes glitch {
    0% { transform: translate(0); text-shadow: 2px 2px #ff0000; }
    25% { transform: translate(-5px, 5px); text-shadow: -2px -2px #550000; }
    50% { transform: translate(5px, -5px); color: #660000; }
    75% { transform: translate(-5px, -5px); }
    100% { transform: translate(0); }
  }

  @keyframes shake {
    0% { transform: skew(0.5deg); opacity: 1; }
    50% { transform: skew(-0.5deg); opacity: 0.8; }
    100% { transform: skew(0.5deg); opacity: 1; }
  }

  /* Кровавая виньетка по краям */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, transparent 40%, #200 100%);
    pointer-events: none;
  }
    hr {
    border: none;
    height: 4px;
    background: linear-gradient(90deg, transparent, #ff0000, transparent);
    box-shadow: 0 0 15px #f00, 0 0 5px #fff;
    width: 80%;
    margin: 20px auto;
    position: relative;
    animation: bleed 3s infinite ease-in-out;
  }

  /* Эффект пульсации и "стекания" */
  @keyframes bleed {
    0% { transform: scaleX(1); opacity: 0.3; filter: blur(1px); }
    50% { transform: scaleX(1.1); opacity: 1; filter: blur(0px); }
    100% { transform: scaleX(1); opacity: 0.3; filter: blur(1px); }
  }

  /* Добавим маленькую "каплю" под линию */
  hr::after {
    content: "▼";
    position: absolute;
    left: 50%;
    top: 2px;
    color: #8b0000;
    font-size: 10px;
    animation: drop 2s infinite;
  }

  @keyframes drop {
    0% { transform: translateY(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(50px); opacity: 0; }
  }

</style>

<body>

<h1>SCARY PAGE</h1>
<p>Добро пожаловать на страницу официальной крипипасты по 9-чан, созданной админом rasko6.</p>
  <hr>
<p>Первая часть: Как Оно Началось</p>
</body>
</html>
