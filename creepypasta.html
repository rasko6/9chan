<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  /* Общие настройки для стабильности */
  body {
    background-color: #f8f9fa; /* Светлый приятный фон */
    color: #212529;           /* Темно-серый текст */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding-top: 50px;
  }

  /* Контейнер, который держит текст ровно по центру */
  .content-wrapper {
    max-width: 700px;
    width: 90%;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Легкая тень для объема */
  }

  h1 {
    font-size: 2.5rem;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
    /* Убрали анимацию glitch — теперь текст стоит на месте */
  }

  p {
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
    /* Убрали анимацию shake — текст больше не трясется */
    color: #444;
  }

  /* Обычная разделительная линия */
  hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 30px 0;
  }

  /* Подпись или акценты */
  .admin-note {
    font-style: italic;
    color: #777;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="content-wrapper">
  <h1>SCARY PAGE</h1>
  
  <p class="admin-note">Официальная крипипаста по 9-чан. Автор: rasko6.</p>
  
  <hr>
  
  <p><strong>Первая часть: Как Оно Началось</strong></p>
  
  <p>
    Здесdь теперь располагается ваш текст. Он больше не двигается, не мерцает и легко читается. 
    Шрифты стали системными, а фон — статичным, что характерно для обычных информационных страниц.
  </p>
</div>

</body>
</html>
