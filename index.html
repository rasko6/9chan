<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>9chan - Доски</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/base-phone.css">
    <style>
        .boards-catalog {
            padding: 30px 20px;
            background: #0a0a0a;
            margin: 20px;
            border-radius: 20px;
            border: 1px solid #d4af37;
        }
        .boards-catalog h2 {
            color: #d4af37;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        .boards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .board-card {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            display: block;
        }
        .board-card:hover {
            border-color: #d4af37;
            transform: translateY(-3px);
            background: #252525;
        }
        .board-name {
            font-size: 2rem;
            font-weight: bold;
            color: #d4af37;
            display: block;
            margin-bottom: 8px;
        }
        .board-desc {
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="board-header">
            <div class="logo-area">
                <img src="icon.png" alt="9chan" class="hitme-icon" onerror="this.src='hitme.png'">
                <h1>9chan</h1>
                <div class="mascot-placeholder">
                    <img src="icon.png" alt="mascot" style="width:48px;height:48px;object-fit:contain;border-radius:50%;" onerror="this.src='hitme.png'">
                </div>
            </div>
            <div class="header-links">
                <a href="index.html">Главная</a>
                <a href="#">Каталог</a>
                <a href="#">Правила</a>
                <a href="#">Помощь</a>
            </div>
            <div class="banner-deutsch">
                <span>🇩🇪 Einheit, Recht, Freiheit 🇩🇪</span>
            </div>
        </header>

        <div class="boards-catalog">
            <h2>📌 Выберите доску</h2>
            <div class="boards-grid" id="boardsGrid"></div>
        </div>

        <footer class="board-footer">
            <div class="footer-content">
                <span>© 9chan — свобода слова, чёрный юмор, немецкое качество</span>
                <img src="icon.png" alt="footer-icon" class="footer-icon" onerror="this.src='hitme.png'">
            </div>
        </footer>
    </div>

    <script>
        const boards = [
            { name: 'b', desc: 'Разное', color: '#d4af37' },
            { name: 'g', desc: 'Технологии & программирование', color: '#4caf50' },
            { name: 'a', desc: 'Аниме & манга', color: '#ff69b4' },
            { name: 'pol', desc: 'Политика', color: '#ff4444' },
            { name: 'd', desc: 'Изображения', color: '#2196f3' },
            { name: 'k', desc: 'Оружие', color: '#795548' }
        ];

        const grid = document.getElementById('boardsGrid');
        if (grid) {
            grid.innerHTML = boards.map(b => `
                <a href="board/${b.name}.html" class="board-card">
                    <span class="board-name">/${b.name}/</span>
                    <span class="board-desc">${b.desc}</span>
                </a>
            `).join('');
        }
    </script>
</body>
</html>
