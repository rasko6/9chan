<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0c10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .image-wrapper {
            max-width: 480px;
            margin: 0 auto 2rem auto;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.3));
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: crisp-edges;
        }

        .status {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #e0e4f0, #9aa3b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 0.5rem;
        }

        .message {
            font-size: 1.3rem;
            font-weight: 500;
            color: #bdc3d4;
            border-top: 1px solid #2c2f36;
            display: inline-block;
            padding-top: 0.75rem;
            margin-bottom: 2rem;
            letter-spacing: 0.3px;
        }

        .return-button {
            display: inline-block;
            background: #2c2f36;
            color: #e0e4f0;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            transition: all 0.2s ease;
            border: 1px solid #454b55;
            letter-spacing: 0.5px;
            backdrop-filter: blur(2px);
        }

        .return-button:hover {
            background: #3e434d;
            border-color: #6e7683;
            color: white;
            transform: scale(1.02);
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .return-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 560px) {
            .status { font-size: 5rem; }
            .message { font-size: 1rem; margin-bottom: 1.5rem; }
            .image-wrapper { max-width: 85%; }
            .return-button { padding: 0.7rem 1.6rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <img src="hitme.png" alt="404">
        </div>
        <div class="status">404</div>
        <div class="message">страница не найдена</div>
        <br>
        <a href="https://rasko6.github.io/9chan/" class="return-button">← вернуться на сайт</a>
    </div>
</body>
</html>
